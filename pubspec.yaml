name: giessen_app
description: "Eine App zur Verwaltung von Gieß-Maßnahmen."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^8.2.2
  pdf: ^3.11.3
  printing: ^5.14.2
  geolocator: ^10.1.0
  scrollable_positioned_list: ^0.3.8
  shared_preferences: ^2.3.0
  connectivity_plus: ^5.0.2
  excel: ^4.0.3
  path_provider: ^2.1.3
  share_plus: ^10.0.2
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon" # Hier wird das Präfix für die Dateien festgelegt
  ios: true
  image_path: "assets/icons/giess_logo.png"
  
  # DAS IST DER WICHTIGE TEIL:
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/giess_logo.png"
  
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/giess_logo.png